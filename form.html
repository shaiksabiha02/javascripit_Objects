<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form id="loginform">
        <label>Username</label>
        <input type="text"
        id="username">
        <br><br>
        <label>Password</label>
        <input type="password"
        id="password">
        <br><br>
        <label>
            <input type="checkbox"
            id="remember">
            Remember
        </label>
     <br><br>
     <select id="role">
        <option>Admin</option>
        <option>User</option>
        <option>Manager</option>

     </select>
     <br><br>
<textarea
id="about"
placeholder="about your self">
</textarea>

<br><br>

<button>
    Login
</button>

</form>
<p id="output"></p>
<script src="form.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
  font-family: Arial;
  margin: 30px;
}

section {
  border: 1px solid #ddd;
  padding: 20px;
  margin-bottom: 20px;
  border-radius: 10px;
}

h2 {
  color: #2c3e50;
}

button {
  margin: 5px;
  padding: 10px;
  cursor: pointer;
}

pre {
  background: #f5f5f5;
  padding: 10px;
}
    </style>

</head>
<body>
    <h2>SessionStorage Shopping Cart</h2>

  <button onclick="addShirt()">Add Shirt (₹499)</button>
  <button onclick="removeShirt()">Remove Shirt</button>
  <button onclick="showCart()">Show Cart</button>
  <button onclick="showTotal()">Total</button>
  <button onclick="clearCart()">Clear</button>

  <div class="box">
    <h3>Cart Items:</h3>
    <pre id="output">[]</pre>

    <h3>Total:</h3>
    <p id="total">₹0</p>
  </div>

<script>
class Cart {
  constructor() {
    this.key = "cart";
    this.cart = JSON.parse(sessionStorage.getItem(this.key)) || [];
  }

  save() {
    sessionStorage.setItem(this.key, JSON.stringify(this.cart));
  }

  add(product) {
    let item = this.cart.find(p => p.id === product.id);

    if (item) {
      item.qty += 1; // increase quantity
    } else {
      this.cart.push({ ...product, qty: 1 });
    }

    this.save();
  }

  remove(id) {
    this.cart = this.cart.filter(item => item.id !== id);
    this.save();
  }

  getAll() {
    return this.cart;
  }

  total() {
    return this.cart.reduce((sum, item) => {
      return sum + item.price * item.qty;
    }, 0);
  }

  clear() {
    this.cart = [];
    this.save();
  }
}

const cart = new Cart();

// UI FUNCTIONS
function addShirt() {
  cart.add({ id: 1, name: "Shirt", price: 499 });
  showCart();
}

function removeShirt() {
  cart.remove(1);
  showCart();
}

function showCart() {
  document.getElementById("output").innerText =
    JSON.stringify(cart.getAll(), null, 2);
}

function showTotal() {
  document.getElementById("total").innerText =
    "₹" + cart.total();
}

function clearCart() {
  cart.clear();
  showCart();
  showTotal();
}

// load initial state
showCart();
showTotal();
</script>
</body>
</html>
